<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Charachter card for Snortleblat, the Rogue Swamp Beast.">
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
    <!-- Open Graph (Facebook, LinkedIn, etc.) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Character card">
    <meta property="og:description" content="Charachter card for Snortleblat, the Rogue Swamp Beast.">
    <meta property="og:url" content="https://yourURLofPage.here">
    <meta property="og:image" content="https://yourURLofSocialPreviewImageHere.png">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Character card">
    <meta name="twitter:description" content="Charachter card for Snortleblat, the Rogue Swamp Beast.">
    <meta name="twitter:image" content="https://yourURLofSocialPreviewImageHere.png">

    <!-- One favicon (ICO works everywhere) -->
    <link rel="icon" href="/favicon.ico">

    <!-- One Apple Touch Icon (iOS home screen) -->
    <link rel="apple-touch-icon" href="/images/apple-touch-icon.png">
    <title>Document</title>
</head>

<body>
    <main>
        <div class="card">
            <img id="characterImage" class="image" src="snortleblat.jpg" alt="Character">

            <h2 id="characterName" class="name"></h2>

            <div class="stats">
                <p><strong>Class:</strong> <span id="characterClass"></span></p>
                <p><strong>Level:</strong> <span id="characterLevel"></span></p>
                <p><strong>Health:</strong> <span id="characterHealth"></span></p>
            </div>

            <div class="buttons">
                <button id="attackBtn">Attacked</button>
                <button id="levelBtn">Level Up</button>
            </div>
        </div>
    </main>
</body>

</html>
